
<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <meta name="theme-color" content="#1A1614" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pawon Kasir" />
    
    <link rel="apple-touch-icon" href="/icon-waiter.png" />
    <link rel="manifest" href="/manifest-waiter.json" />

    <title>Pawon Salam - Waiter Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html, body {
        overscroll-behavior-y: none;
        overscroll-behavior-x: none;
        height: 100%;
        width: 100%;
      }

      body {
        -webkit-user-select: none;
        -moz-user-select: none;
             user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        background-color: #F3F4F6;
      }

      input, textarea {
        -webkit-user-select: text;
        -moz-user-select: text;
             user-select: text;
      }

      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
       
      ::-webkit-scrollbar-thumb {
        background-color: rgba(0, 0, 0, 0.1); 
        border-radius: 10px; 
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background-color: rgba(0, 0, 0, 0.2); 
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-pawon-bg select-none font-sans text-pawon-dark antialiased overflow-hidden">
    <div id="root" class="h-full overflow-y-auto"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((registration) => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            })
            .catch((err) => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
  <script type="module" src="/src/apps/waiter/main.tsx"></script>
</body>
</html>
